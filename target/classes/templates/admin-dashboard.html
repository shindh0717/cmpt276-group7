<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - WhereTo</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>👑 Admin Dashboard</h1>
        <p>Welcome, <strong >Admin</strong>!</p>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <p class="stat-number" th:text="${totalUsers}">0</p>
            </div>
        </div>
        
        <h2>All Registered Users</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Joined</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                   
                   
                    <td th:text="${user.email}">john@email.com</td>
                    <td>
                        <span th:if="${user.isAdmin()}" class="badge-admin">Admin</span>
                        <span th:unless="${user.isAdmin()}" class="badge-user">Regular</span>
                    </td>
                   
                </tr>
            </tbody>
        </table>
        
        <div class="actions">
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </div>
</body>
</html>
