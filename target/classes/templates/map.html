  <gmp-map 
    zoom="15" 
    map-id="DEMO_MAP_ID"
  >
    <gmp-advanced-marker id="marker"></gmp-advanced-marker>
    <div id="controls" slot="control-inline-start-block-start">
      <select name="types" class="type-select">
        <option value="" selected>Similar location</option>
        <option value="cafe">Cafe</option>
        <option value="restaurant">Restaurant</option>
        <option value="museum">Museum</option>
        <option value="park">Park</option>
      </select>
      <form th:action="@{/location/save}" method="post">
        <input type="hidden" id="lat-input" name="lat" />
        <input type="hidden" id="lng-input" name="lng" />
      </form>
      <button>
        <a href="/logout" class="btn-logout">Logout</a>
      </button>
      <button id="show-saved-btn">
        Show Saved Location
      </button>
    </div>
  </gmp-map>
  <div id="saved-locations-panel" style="display: none;">
    <h3>Saved locations</h3>
