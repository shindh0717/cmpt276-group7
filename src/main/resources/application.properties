spring.application.name=group
spring.session.jdbc.initialize-schema=always

# Render runs behind an HTTPS reverse proxy; without this, session cookies may not
# be set correctly and login appears to succeed but the next request is unauthenticated.
server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/}
spring.datasource.username=${DB_USR:postgres}
spring.datasource.password=${DB_PWD:postgres}


spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
