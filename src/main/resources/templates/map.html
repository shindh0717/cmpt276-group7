<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" type="text/css" href="./style.css" />
  <script type="module" src="./index.js"></script>
  <script>(g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})
      ({key: "AIzaSyAMoapWcdUnJXZLIOj8Qgp2t1sTDLGHzqU", v: "weekly", language: "en"});</script>
</head>
<body>
  <gmp-map 
    zoom="15" 
    map-id="DEMO_MAP_ID"
  >
    <gmp-advanced-marker id="marker"></gmp-advanced-marker>
    <div id="controls" slot="control-inline-start-block-start">
      <select name="types" class="type-select">
        <option value="" selected>Similar location</option>
        <option value="cafe">Cafe</option>
        <option value="restaurant">Restaurant</option>
        <option value="museum">Museum</option>
        <option value="park">Park</option>
      </select>
      <form id="save-form" th:action="@{/saveLocation}" method="post">
        <input type="hidden" id="lat-input" name="latitude" />
        <input type="hidden" id="lng-input" name="longitude" />
        <input type="hidden" id="name-input" name="locationName"/>
      </form>
      <button>
        <a href="/logout" class="btn-logout">Logout</a>
      </button>
      <button id="show-saved-btn">
        Show Saved Location
      </button>
    </div>
  </gmp-map>
  <div id="saved-locations-panel" style="display: none;">
    <h3>Saved locations</h3>
    <ul>
      <li th:each="loc:${savedLocations}">
        <span th:text="${loc.locationName}"></span>

        <div style="display: flex; gap: 5px;">
          <button type="button" class="go-btn" style="width: 60px; height: 30px;"  th:attr="data-lat=${loc.latitude},data-lng=${loc.longitude}" th:onclick="'panToLocation(' + ${loc.latitude} + ', ' + ${loc.longitude} + ')'">Go</button>
          <a th:href="@{/location/delete(id=${loc.id})}">
            <button type="button" style="width: 60px; height: 30px;">Delete</button>
          </a>
        </div>
      </li>
    </ul>
  </div>
</body>
</html>
